<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>募集要項｜sample salon</title>
    <meta name="description" content="sample salonのママ美容師向け募集要項です。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;800&family=Noto+Serif+JP:wght@500;600;700&family=Zen+Old+Mincho:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" href="./assets/img/logo_sample_salon.png" type="image/png">
    <link rel="stylesheet" href="./assets/css/style.css">
  </head>
  <body class="requirements-page">
    <main class="requirements">
      <img class="requirements-logo" src="./assets/img/logo_sample_salon.png" alt="sample salon" width="260" height="180">
      <p class="section-kicker">ママ美容師採用</p>
      <h1>募集要項</h1>
      <p class="requirements-lead">家庭の予定やブランクに寄り添いながら、少しずつ美容師としての感覚を取り戻せる働き方を想定したダミー内容です。</p>

      <dl class="requirements-list">
        <div>
          <dt>募集職種</dt>
          <dd>スタイリスト／アシスタント</dd>
        </div>
        <div>
          <dt>雇用形態</dt>
          <dd>パート・アルバイト</dd>
        </div>
        <div>
          <dt>勤務日数</dt>
          <dd>週3日〜相談OK。学校行事やご家庭の予定を考慮します。</dd>
        </div>
        <div>
          <dt>勤務時間</dt>
          <dd>10:00〜16:00の間で相談OK。短時間勤務も可能です。</dd>
        </div>
        <div>
          <dt>給与</dt>
          <dd>時給1,300円〜1,800円。経験・スキルを考慮して決定します。</dd>
        </div>
        <div>
          <dt>待遇</dt>
          <dd>交通費支給、技術サポート、練習制度、扶養内勤務相談可。</dd>
        </div>
        <div>
          <dt>応募条件</dt>
          <dd>美容師免許をお持ちの方。ブランクのある方も歓迎します。</dd>
        </div>
      </dl>

      <a class="requirements-close" href="./index.html#contact">戻る</a>
    </main>
  </body>
</html>
